<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Tawan Todo List</h1>
            <p>Stay organized, stay productive.</p>
        </header>

        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="What needs to be done?" required autocomplete="off">
            <button type="submit" id="add-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </form>

        <div class="list-container">
            <div id="loading" class="hidden">Loading tasks...</div>
            <div id="error-message" class="hidden error"></div>
            <ul id="todo-list">
                <!-- Todo items will be injected here via JS -->
            </ul>
        </div>
    </div>

    <!-- API Key settings modal (Optional, but good for demo) -->
    <div class="info-badge">
        <span>Protected API</span>
    </div>

    <script src="app.js"></script>
</body>

</html>
